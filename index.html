<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; min-height: 100%; }
  body { font-family: 'Zen Kaku Gothic New', sans-serif; background: #FFFDF7; color: #2B2620; }
  select, input, button { font-family: inherit; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: #EADFC0; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useMemo, useRef } = React;

// ============================================================
// 定数
// ============================================================
const LEVEL_ORDER = ['①要改善', '②高', '③中', '④低', '⑤懸念', '⑥指摘ナシ'];
const LEVEL_COLOR = {
  '①要改善': '#C0392B',
  '②高': '#E07B39',
  '③中': '#E0A526',
  '④低': '#8FA85E',
  '⑤懸念': '#9AA7AE',
  '⑥指摘ナシ': '#D8D2C0',
};
const STAGE_ORDER = ['①ダミー', '②T-1', '③T-2', '④T-3', '⑤T-4', '⑥T-5', '⑧量産前', '⑨量産抜き', '⑩完パケ(予備)'];

const COLORS = {
  paper: '#FFFDF7',
  paperDeep: '#FFF6E0',
  ink: '#2B2620',
  inkSoft: '#8A8175',
  line: '#EADFC0',
  gold: '#FFC000',
  goldDeep: '#E0A800',
  goldSoft: '#FFF1C2',
};

const REQUIRED_COLS = ['実施月','実施日','担当者','新規/リピート','案件名','アイテム名','案件_アイテム名',
  'サンプル段階','クライアント名','仕入先','区分','項目','項目詳細','レベル','スコア'];

// ============================================================
// ヘルパー
// ============================================================
function uniq(arr) { return Array.from(new Set(arr)); }

function monthSort(a, b) {
  const pa = a.match(/(\d+)年(\d+)月/);
  const pb = b.match(/(\d+)年(\d+)月/);
  if (!pa || !pb) return 0;
  const va = parseInt(pa[1]) * 100 + parseInt(pa[2]);
  const vb = parseInt(pb[1]) * 100 + parseInt(pb[2]);
  return va - vb;
}

function stageIndex(stage) {
  const i = STAGE_ORDER.indexOf(stage);
  return i === -1 ? 999 : i;
}

function stageColor(i) {
  const palette = [COLORS.gold, '#E0A526', COLORS.ink, '#8FA85E', '#9AA7AE', '#C0392B', COLORS.goldDeep, '#7A8C5C', '#B98E3D'];
  return palette[i % palette.length];
}

function scoreColor(score) {
  if (score >= 80) return '#5C7A33';
  if (score >= 60) return COLORS.goldDeep;
  return '#C0392B';
}

// 実施日から四半期・年度を計算
// 四半期: Q1=9-11, Q2=12-2, Q3=3-5, Q4=6-8
// 年度: 9月始まり（9月～翌8月）
function getQuarter(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  const m = d.getMonth() + 1; // 1-12
  const y = d.getFullYear();
  let q, fyStart;
  if (m >= 9 && m <= 11) { q = 1; fyStart = y; }
  else if (m === 12) { q = 2; fyStart = y; }
  else if (m >= 1 && m <= 2) { q = 2; fyStart = y - 1; }
  else if (m >= 3 && m <= 5) { q = 3; fyStart = y - 1; }
  else { q = 4; fyStart = y - 1; } // 6-8
  return { q, fyStart, fyLabel: `${fyStart}年9月期`, qLabel: `${fyStart}年度 Q${q}` };
}

function getFiscalYear(dateStr) {
  const qi = getQuarter(dateStr);
  return qi ? qi.fyStart : null;
}

// ============================================================
// CSVパース・正規化
// ============================================================
const GSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_8kLrLGahEliWMZvYNgisSF7SyceAR7wRg206xmgR_8ze5rVxI3gporLCLAhs6aEueRTzvBFSTOYC/pub?gid=0&single=true&output=csv';

function normalizeRow(row) {
  const score = row['スコア'];
  return {
    '実施月': row['実施月'] || '',
    '実施日': row['実施日'] || '',
    '担当者': row['担当者'] || '',
    '新規リピート': row['新規/リピート'] || row['新規リピート'] || '',
    '案件名': row['案件名'] || '',
    'アイテム名': row['アイテム名'] || '',
    '案件_アイテム名': row['案件_アイテム名'] || `${row['案件名'] || ''}_${row['アイテム名'] || ''}`,
    'QMオブジェクトNo': row['QMオブジェクトNo.'] || row['QMオブジェクトNo'] || '',
    'サンプル段階': row['サンプル段階'] || '',
    'クライアント名': row['クライアント名'] || '',
    '提供方法': row['提供方法'] || '',
    '仕入先': row['仕入先'] || '',
    '家表法': row['家表法'] || '',
    '食衛法': row['食衛法'] || '',
    '基準書': row['基準書'] || '',
    '容リ法紙': row['容リ法（紙）'] || '',
    '容リ法プラ': row['容リ法（プラ）'] || '',
    '実物確認': row['実物確認'] || '',
    '適否': row['適否'] || '',
    '区分': row['要改善/注意(仕入先)/注意(TR側)'] || row['区分'] || '',
    '項目': (row['項目'] || '').replace(/\r?\n/g, ''),
    '項目詳細': row['項目詳細'] || '',
    'レベル': row['レベル'] || '',
    'スコア': score !== undefined && score !== '' && !isNaN(parseFloat(score)) ? parseFloat(score) : null,
  };
}

function parseCSVText(text) {
  return new Promise((resolve, reject) => {
    Papa.parse(text, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        const rows = results.data.map(normalizeRow).filter(r => r['案件名']);
        resolve(rows);
      },
      error: reject,
    });
  });
}

// ============================================================
// メインアプリ
// ============================================================
function App() {
  const [data, setData] = useState(null);
  const [dataSource, setDataSource] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  // 起動時にGoogleスプレッドシートから自動読み込み
  React.useEffect(() => {
    setLoading(true);
    setError('');
    fetch(GSHEET_CSV_URL)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.text();
      })
      .then(text => parseCSVText(text))
      .then(rows => {
        if (rows.length === 0) throw new Error('データが見つかりませんでした');
        setData(rows);
        setDataSource('Googleスプレッドシート（自動取得）');
        setLoading(false);
      })
      .catch(err => {
        setLoading(false);
        setError('スプレッドシートからの読み込みに失敗しました。CSVファイルをアップロードしてください。\n(' + err.message + ')');
      });
  }, []);

  const handleFile = (file) => {
    setError('');
    const reader = new FileReader();
    reader.onload = (e) => {
      parseCSVText(e.target.result)
        .then(rows => {
          if (rows.length === 0) {
            setError('データが見つかりませんでした。');
            return;
          }
          setData(rows);
          setDataSource(file.name);
        })
        .catch(err => setError('読み込みエラー：' + err.message));
    };
    reader.readAsText(file, 'UTF-8');
  };

  const handleReload = () => {
    setLoading(true);
    setError('');
    fetch(GSHEET_CSV_URL + '&t=' + Date.now())
      .then(r => r.text())
      .then(text => parseCSVText(text))
      .then(rows => {
        setData(rows);
        setDataSource('Googleスプレッドシート（' + new Date().toLocaleString('ja-JP') + '更新）');
        setLoading(false);
      })
      .catch(err => {
        setLoading(false);
        setError('再読み込みに失敗しました：' + err.message);
      });
  };

  if (loading) return <LoadingScreen />;
  if (!data) return <UploadScreen onFile={handleFile} error={error} />;
  return <Dashboard data={data} dataSource={dataSource} onReload={handleReload} onReset={() => setData(null)} />;
}

// ============================================================
// ローディング画面
// ============================================================
function LoadingScreen() {
  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: COLORS.paper }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ width: 56, height: 56, borderRadius: '50%', background: COLORS.gold, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, fontSize: 18, margin: '0 auto 20px', color: COLORS.ink }}>QC</div>
        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>データを読み込んでいます...</div>
        <div style={{ fontSize: 12, color: COLORS.inkSoft }}>Googleスプレッドシートから最新データを取得中</div>
      </div>
    </div>
  );
}

// ============================================================
// アップロード画面（スプシ読み込み失敗時のフォールバック）
// ============================================================
function UploadScreen({ onFile, error }) {
  const inputRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);

  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      background: COLORS.paper,
      padding: 24,
    }}>
      <div style={{ maxWidth: 480, width: '100%', textAlign: 'center' }}>
        <div style={{
          width: 56, height: 56, borderRadius: '50%', background: COLORS.gold,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontWeight: 900, fontSize: 18, margin: '0 auto 20px', color: COLORS.ink,
        }}>QC</div>
        <h1 style={{ fontSize: 24, fontWeight: 900, marginBottom: 8 }}>SC分析ダッシュボード</h1>
        <p style={{ fontSize: 13, color: COLORS.inkSoft, marginBottom: 28, lineHeight: 1.7 }}>
          スプレッドシートからの自動取得に失敗しました。<br/>
          CSVファイルを手動でアップロードしてください。
        </p>
        <div
          onClick={() => inputRef.current.click()}
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={(e) => {
            e.preventDefault();
            setDragOver(false);
            if (e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]);
          }}
          style={{
            border: `2px dashed ${dragOver ? COLORS.gold : COLORS.line}`,
            borderRadius: 12,
            padding: '40px 24px',
            cursor: 'pointer',
            background: dragOver ? COLORS.goldSoft : '#fff',
            transition: 'all 0.15s',
          }}
        >
          <div style={{ fontSize: 32, marginBottom: 10 }}>📄</div>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>CSVファイルをドラッグ＆ドロップ</div>
          <div style={{ fontSize: 12, color: COLORS.inkSoft }}>またはクリックして選択</div>
          <input
            ref={inputRef}
            type="file"
            accept=".csv"
            style={{ display: 'none' }}
            onChange={(e) => { if (e.target.files[0]) onFile(e.target.files[0]); }}
          />
        </div>
        {error && (
          <div style={{
            marginTop: 16, padding: '10px 14px', background: '#FDEEEC',
            border: '1px solid #C0392B', borderRadius: 8, color: '#C0392B', fontSize: 12.5,
          }}>{error}</div>
        )}
        <div style={{ marginTop: 24, fontSize: 11, color: COLORS.inkSoft, lineHeight: 1.8 }}>
          想定列：実施月 / 実施日 / 担当者 / 新規・リピート / 案件名 / アイテム名 / <br/>
          案件_アイテム名 / サンプル段階 / クライアント名 / 仕入先 / 区分 / 項目 / 項目詳細 / レベル / スコア
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ダッシュボード本体
// ============================================================
function Dashboard({ data, dataSource, onReload, onReset }) {
  const [periodMode, setPeriodMode] = useState('all'); // all, custom, month, quarter, fiscal
  const [periodValue, setPeriodValue] = useState(null); // 選択値（モードに応じて型変わる）
  const [customStart, setCustomStart] = useState('');
  const [customEnd, setCustomEnd] = useState('');
  const [activeTab, setActiveTab] = useState('home');

  // 期間オプション生成
  const periodOptions = useMemo(() => {
    const months = uniq(data.map(d => d['実施月'])).filter(Boolean).sort(monthSort);
    const quarters = uniq(data.map(d => {
      const qi = getQuarter(d['実施日']);
      return qi ? qi.qLabel : null;
    }).filter(Boolean));
    const fiscalYears = uniq(data.map(d => getFiscalYear(d['実施日'])).filter(v => v !== null)).sort();
    return { months, quarters, fiscalYears };
  }, [data]);

  // フィルター適用
  const filtered = useMemo(() => {
    if (periodMode === 'all') return data;
    if (periodMode === 'custom') {
      if (!customStart && !customEnd) return data;
      return data.filter(d => {
        const dt = d['実施日'];
        if (!dt) return false;
        if (customStart && dt < customStart) return false;
        if (customEnd && dt > customEnd) return false;
        return true;
      });
    }
    if (periodMode === 'month') {
      if (!periodValue) return data;
      return data.filter(d => d['実施月'] === periodValue);
    }
    if (periodMode === 'quarter') {
      if (!periodValue) return data;
      return data.filter(d => {
        const qi = getQuarter(d['実施日']);
        return qi && qi.qLabel === periodValue;
      });
    }
    if (periodMode === 'fiscal') {
      if (periodValue === null || periodValue === undefined) return data;
      return data.filter(d => getFiscalYear(d['実施日']) === periodValue);
    }
    return data;
  }, [data, periodMode, periodValue, customStart, customEnd]);

  return (
    <div>
      <Header dataSource={dataSource} onReload={onReload} onReset={onReset} />
      <PeriodBar
        mode={periodMode} setMode={setPeriodMode}
        value={periodValue} setValue={setPeriodValue}
        customStart={customStart} setCustomStart={setCustomStart}
        customEnd={customEnd} setCustomEnd={setCustomEnd}
        options={periodOptions}
      />
      <TabBar activeTab={activeTab} setActiveTab={setActiveTab} />
      <main style={{ padding: '20px 24px 40px', maxWidth: 1100, margin: '0 auto' }}>
        {activeTab === 'home' && <HomeTab data={filtered} />}
        {activeTab === 'volume' && <VolumeTab data={filtered} />}
        {activeTab === 'score' && <ScoreTab data={filtered} />}
        {activeTab === 'defects' && <DefectsTab data={filtered} />}
        {activeTab === 'suppliers' && <SuppliersTab data={filtered} />}
        {activeTab === 'internal' && <InternalTab data={filtered} />}
      </main>
      <Footer count={filtered.length} total={data.length} />
    </div>
  );
}

// ============================================================
// ヘッダー
// ============================================================
function Header({ dataSource, onReload, onReset }) {
  return (
    <div style={{ background: COLORS.ink, padding: '24px 24px 20px' }}>
      <div style={{
        maxWidth: 1100, margin: '0 auto', display: 'flex',
        justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12,
      }}>
        <div>

// レスポンシブ幅取得用フック
function useContainerWidth() {
  const ref = useRef(null);
  const [width, setWidth] = useState(600);
  React.useEffect(() => {
    if (!ref.current) return;
    const update = () => setWidth(ref.current.offsetWidth || 600);
    update();
    const ro = new ResizeObserver(update);
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);
  return [ref, width];
}

// 縦向き積み上げ／グループ バーチャート（カテゴリX軸）
// series: [{ key, name, color }], data: [{ label, [key]: value, ... }]
function VBarChart({ data, series, height = 280, stacked = true, showLegend = true, formatValue, colorByIndex }) {
  const [ref, width] = useContainerWidth();
  const padL = 40, padR = 16, padT = 16, padB = 32;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;

  const maxVal = useMemo(() => {
    let m = 0;
    data.forEach(row => {
      if (stacked) {
        let sum = 0;
        series.forEach(s => { sum += (row[s.key] || 0); });
        m = Math.max(m, sum);
      } else {
        series.forEach(s => { m = Math.max(m, row[s.key] || 0); });
      }
    });
    return m === 0 ? 1 : m;
  }, [data, series, stacked]);

  const niceMax = niceNumber(maxVal);
  const yTicks = makeTicks(niceMax);

  const n = data.length || 1;
  const groupW = innerW / n;
  const barGroupPad = groupW * 0.18;
  const barAreaW = groupW - barGroupPad * 2;
  const barW = stacked ? barAreaW : barAreaW / series.length;

  const [hover, setHover] = useState(null);

  return (
    <div ref={ref} style={{ width: '100%' }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
        {/* grid + y axis */}
        {yTicks.map((t, i) => {
          const y = padT + innerH - (t / niceMax) * innerH;
          return (
            <g key={i}>
              <line x1={padL} x2={padL + innerW} y1={y} y2={y} stroke={COLORS.line} strokeDasharray="3 3" />
              <text x={padL - 8} y={y} textAnchor="end" dominantBaseline="middle" fontSize="11" fill={COLORS.inkSoft} fontFamily="'Zen Kaku Gothic New', sans-serif">{t}</text>
            </g>
          );
        })}
        <line x1={padL} x2={padL} y1={padT} y2={padT + innerH} stroke={COLORS.ink} />
        <line x1={padL} x2={padL + innerW} y1={padT + innerH} y2={padT + innerH} stroke={COLORS.ink} />

        {/* bars */}
        {data.map((row, gi) => {
          const gx = padL + gi * groupW + barGroupPad;
          let stackY = padT + innerH;
          return (
            <g key={gi}>
              {series.map((s, si) => {
                const val = row[s.key] || 0;
                const h = (val / niceMax) * innerH;
                let x, y;
                if (stacked) {
                  x = gx;
                  y = stackY - h;
                  stackY -= h;
                } else {
                  x = gx + si * barW;
                  y = padT + innerH - h;
                }
                const key = `${gi}-${si}`;
                return (
                  <rect
                    key={key}
                    x={x} y={y} width={Math.max(0, barW - (stacked ? 0 : 2))} height={Math.max(0, h)}
                    fill={colorByIndex ? colorByIndex(gi, row) : s.color} rx={2}
                    opacity={hover === key ? 0.75 : 1}
                    onMouseEnter={() => setHover(key)}
                    onMouseLeave={() => setHover(null)}
                  >
                    <title>{`${row.label} / ${s.name}: ${formatValue ? formatValue(val) : val}`}</title>
                  </rect>
                );
              })}
              <text x={gx + barAreaW / 2} y={padT + innerH + 18} textAnchor="middle" fontSize="11" fill={COLORS.inkSoft} fontFamily="'Zen Kaku Gothic New', sans-serif">{row.label}</text>
            </g>
          );
        })}
      </svg>
      {showLegend && series.length > 1 && (
        <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', justifyContent: 'center', marginTop: 6 }}>
          {series.map(s => (
            <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11.5 }}>
              <span style={{ width: 11, height: 11, background: s.color, display: 'inline-block', borderRadius: 2 }} />
              {s.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// 横向きバーチャート（カテゴリY軸）
// data: [{ label, value, color? }]
function HBarChart({ data, height, labelWidth = 140, color, max, formatValue }) {
  const [ref, width] = useContainerWidth();
  const rowH = 32;
  const h = height || Math.max(120, data.length * rowH + 20);
  const padL = labelWidth, padR = 50, padT = 8, padB = 8;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = h - padT - padB;
  const barH = Math.min(22, innerH / Math.max(1, data.length) - 8);

  const maxVal = max || Math.max(1, ...data.map(d => d.value));
  const niceMax = niceNumber(maxVal);

  return (
    <div ref={ref} style={{ width: '100%' }}>
      <svg width="100%" height={h} viewBox={`0 0 ${width} ${h}`} style={{ display: 'block', overflow: 'visible' }}>
        <line x1={padL} x2={padL} y1={padT} y2={h - padB} stroke={COLORS.ink} />
        {data.map((d, i) => {
          const rowCenter = padT + (i + 0.5) * (innerH / data.length);
          const barLen = (d.value / niceMax) * innerW;
          return (
            <g key={i}>
              <text x={padL - 8} y={rowCenter} textAnchor="end" dominantBaseline="middle" fontSize="12" fontWeight="600" fill={COLORS.ink} fontFamily="'Zen Kaku Gothic New', sans-serif">{d.label}</text>
              <rect x={padL} y={rowCenter - barH / 2} width={Math.max(0, barLen)} height={barH} fill={d.color || color} rx={4}>
                <title>{`${d.label}: ${formatValue ? formatValue(d.value) : d.value}`}</title>
              </rect>
              <text x={padL + barLen + 8} y={rowCenter} dominantBaseline="middle" fontSize="11.5" fontWeight="700" fill={COLORS.ink} fontFamily="'JetBrains Mono', monospace">
                {formatValue ? formatValue(d.value) : d.value}
              </text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// 折れ線/直線グラフ
// data: [{ label, value, n? }]
function LineChartSimple({ data, height = 280, color, refLine, domain, formatValue }) {
  const [ref, width] = useContainerWidth();
  const padL = 40, padR = 16, padT = 16, padB = 32;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;

  const values = data.map(d => d.value);
  const dMin = domain ? domain[0] : 0;
  const dMax = domain ? domain[1] : niceNumber(Math.max(...values));
  const yTicks = makeTicks(dMax, dMin);

  const n = data.length;
  const stepX = n > 1 ? innerW / (n - 1) : 0;
  const [hover, setHover] = useState(null);

  const points = data.map((d, i) => {
    const x = padL + (n > 1 ? i * stepX : innerW / 2);
    const y = padT + innerH - ((d.value - dMin) / (dMax - dMin)) * innerH;
    return { x, y, ...d };
  });

  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

  return (
    <div ref={ref} style={{ width: '100%' }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
        {yTicks.map((t, i) => {
          const y = padT + innerH - ((t - dMin) / (dMax - dMin)) * innerH;
          return (
            <g key={i}>
              <line x1={padL} x2={padL + innerW} y1={y} y2={y} stroke={COLORS.line} strokeDasharray="3 3" />
              <text x={padL - 8} y={y} textAnchor="end" dominantBaseline="middle" fontSize="11" fill={COLORS.inkSoft} fontFamily="'Zen Kaku Gothic New', sans-serif">{t}</text>
            </g>
          );
        })}
        {refLine !== undefined && (
          <g>
            <line x1={padL} x2={padL + innerW} y1={padT + innerH - ((refLine - dMin) / (dMax - dMin)) * innerH} y2={padT + innerH - ((refLine - dMin) / (dMax - dMin)) * innerH} stroke={COLORS.inkSoft} strokeDasharray="5 4" />
          </g>
        )}
        <line x1={padL} x2={padL} y1={padT} y2={padT + innerH} stroke={COLORS.ink} />
        <line x1={padL} x2={padL + innerW} y1={padT + innerH} y2={padT + innerH} stroke={COLORS.ink} />

        <path d={pathD} fill="none" stroke={color} strokeWidth={3} />

        {points.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={6} fill={COLORS.gold} stroke={COLORS.ink} strokeWidth={1.5}
              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} />
            {hover === i && (
              <g>
                <rect x={p.x - 38} y={p.y - 38} width={76} height={26} rx={6} fill={COLORS.ink} />
                <text x={p.x} y={p.y - 25} textAnchor="middle" fontSize="12" fontWeight="700" fill="#fff" fontFamily="'Zen Kaku Gothic New', sans-serif">
                  {formatValue ? formatValue(p.value, p) : p.value}
                </text>
              </g>
            )}
            <text x={p.x} y={padT + innerH + 18} textAnchor="middle" fontSize="11" fill={COLORS.inkSoft} fontFamily="'Zen Kaku Gothic New', sans-serif">{p.label}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

// y軸の良い感じの最大値・目盛りを算出
function niceNumber(val) {
  if (val <= 0) return 1;
  const exp = Math.floor(Math.log10(val));
  const base = Math.pow(10, exp);
  const norm = val / base;
  let nice;
  if (norm <= 1) nice = 1;
  else if (norm <= 2) nice = 2;
  else if (norm <= 5) nice = 5;
  else nice = 10;
  return nice * base;
}

function makeTicks(max, min = 0) {
  const range = max - min;
  const step = range / 4;
  const ticks = [];
  for (let i = 0; i <= 4; i++) {
    const v = min + step * i;
    ticks.push(Math.round(v * 10) / 10);
  }
  return ticks;
}

function HomeTab({ data }) {
  const totalItems = uniq(data.map(d => d['案件_アイテム名'])).length;
  const issues = data.filter(d => d['区分'] !== '④指摘ナシ' && d['項目']);
  const scores = data.map(d => d['スコア']).filter(v => typeof v === 'number');
  const avgScore = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length) : null;

  const levelCounts = useMemo(() => {
    const m = {};
    issues.forEach(d => { m[d['レベル']] = (m[d['レベル']] || 0) + 1; });
    return LEVEL_ORDER.filter(l => l !== '⑥指摘ナシ' && m[l]).map(l => ({ level: l, count: m[l] }));
  }, [issues]);

  // 要改善一覧
  const criticalItems = issues.filter(d => d['区分'] === '①要改善');

  // 納品近接段階
  const lateStages = ['⑧量産前', '⑨量産抜き', '⑩完パケ(予備)'];

  // 低スコア（80未満）の最新段階アイテム
  const itemTrends = useMemo(() => {
    const m = {};
    data.forEach(d => {
      if (typeof d['スコア'] !== 'number') return;
      const key = d['案件_アイテム名'];
      if (!m[key]) m[key] = {};
      m[key][d['サンプル段階']] = { score: d['スコア'], 実物確認: d['実物確認'], 適否: d['適否'] };
    });
    return Object.entries(m).map(([item, stages]) => {
      const entries = Object.entries(stages).sort((a,b) => stageIndex(a[0]) - stageIndex(b[0]));
      const last = entries[entries.length - 1];
      return { item, latestStage: last[0], latestScore: last[1].score, 実物確認: last[1].実物確認, 適否: last[1].適否 };
    });
  }, [data]);
  const urgentLow = itemTrends.filter(t => lateStages.includes(t.latestStage) && t.latestScore < 80)
    .sort((a,b) => a.latestScore - b.latestScore);

  // ⚠️ 実物確認「未」（納品近接段階）
  const missingJikken = useMemo(() => {
    const seen = new Set();
    const result = [];
    data.forEach(d => {
      if (!lateStages.includes(d['サンプル段階'])) return;
      if (d['実物確認'] !== '未') return;
      const key = d['案件_アイテム名'] + d['サンプル段階'];
      if (seen.has(key)) return;
      seen.add(key);
      result.push(d);
    });
    return result;
  }, [data]);

  // ⚠️ 適否「×」一覧
  const tekihi_batsu = useMemo(() => {
    const seen = new Set();
    const result = [];
    data.forEach(d => {
      if (d['適否'] !== '×') return;
      const key = d['案件_アイテム名'] + d['サンプル段階'];
      if (seen.has(key)) return;
      seen.add(key);
      result.push(d);
    });
    return result;
  }, [data]);

  const alertCount = missingJikken.length + tekihi_batsu.length + urgentLow.length + criticalItems.length;

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <StatBlock label="担当アイテム数" value={totalItems} unit="件" accent />
        <StatBlock label="平均スコア" value={avgScore !== null ? avgScore.toFixed(1) : '—'} unit="点" />
        <StatBlock label="指摘総数" value={issues.length} unit="件" />
        <StatBlock label="要対応アラート" value={alertCount} unit="件" />
      </div>

      {/* アラートセクション */}
      {alertCount > 0 && (
        <div style={{ background: '#FFF5F5', border: '1.5px solid #C0392B', borderRadius: 10, padding: '14px 18px', marginBottom: 20 }}>
          <div style={{ fontWeight: 900, fontSize: 14, color: '#C0392B', marginBottom: 12 }}>⚠️ 要対応アラート</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

            {missingJikken.length > 0 && (
              <AlertBlock title={`実物確認 未（納品近接段階）— ${missingJikken.length}件`} color="#E07B39">
                {missingJikken.map((d, i) => (
                  <AlertRow key={i} label={d['案件_アイテム名']} stage={d['サンプル段階']} extra={d['QMオブジェクトNo'] || ''} />
                ))}
              </AlertBlock>
            )}

            {tekihi_batsu.length > 0 && (
              <AlertBlock title={`適否 × — ${tekihi_batsu.length}件`} color="#C0392B">
                {tekihi_batsu.map((d, i) => (
                  <AlertRow key={i} label={d['案件_アイテム名']} stage={d['サンプル段階']} extra={d['QMオブジェクトNo'] || ''} />
                ))}
              </AlertBlock>
            )}

            {urgentLow.length > 0 && (
              <AlertBlock title={`納品近接・低スコア（80点未満）— ${urgentLow.length}件`} color="#E0A526">
                {urgentLow.map((t, i) => (
                  <AlertRow key={i} label={t.item} stage={t.latestStage} extra={`${t.latestScore}点`} />
                ))}
              </AlertBlock>
            )}

            {criticalItems.length > 0 && (
              <AlertBlock title={`要改善（①要改善）— ${criticalItems.length}件`} color="#C0392B">
                {uniq(criticalItems.map(d => d['案件_アイテム名'])).map((item, i) => (
                  <AlertRow key={i} label={item} stage="" extra="" />
                ))}
              </AlertBlock>
            )}
          </div>
        </div>
      )}

      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
        <div style={{ flex: '1 1 320px' }}>
          <Card title="リスクレベル分布" sub="ISSUE LEVEL BREAKDOWN">
            {levelCounts.length > 0 ? (
              <VBarChart
                data={levelCounts.map(l => ({ label: l.level.replace(/^[①-⑩]/, ''), v: l.count, _level: l.level }))}
                series={[{ key: 'v', name: '件数', color: COLORS.gold }]}
                height={220}
                showLegend={false}
                formatValue={v => `${v}件`}
                colorByIndex={(i, row) => LEVEL_COLOR[row._level]}
              />
            ) : <EmptyNote />}
          </Card>
        </div>
        <div style={{ flex: '1 1 320px' }}>
          <Card title="納品近接・低スコア（80点未満）" sub="LATE STAGE LOW SCORE">
            {urgentLow.length > 0 ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxHeight: 220, overflowY: 'auto' }}>
                {urgentLow.map(t => (
                  <div key={t.item} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', border: '1px solid #C0392B', borderRadius: 8, background: '#FDEEEC' }}>
                    <span style={{ fontWeight: 700, fontSize: 12.5, flex: 1 }}>{t.item}</span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: COLORS.inkSoft }}>{t.latestStage.replace(/^[①-⑩]/, '')}</span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, fontWeight: 700, color: '#C0392B' }}>{t.latestScore}点</span>
                  </div>
                ))}
              </div>
            ) : <div style={{ fontSize: 13, color: COLORS.inkSoft, padding: '24px 0', textAlign: 'center' }}>該当なし ✅</div>}
          </Card>
        </div>
      </div>

      <Card title="要改善 一覧" sub="MUST-FIX ITEMS — ①要改善">
        {criticalItems.length > 0 ? (
          <table style={tableStyle}>
            <thead><tr><th style={thStyle}>QMオブジェクトNo</th><th style={thStyle}>アイテム</th><th style={thStyle}>項目</th><th style={thStyle}>詳細</th><th style={thStyle}>段階</th></tr></thead>
            <tbody>
              {criticalItems.map((d, i) => (
                <tr key={i}>
                  <td style={{...tdStyle, fontFamily: "'JetBrains Mono', monospace", fontSize: 11}}>{d['QMオブジェクトNo']}</td>
                  <td style={tdStyle}>{d['案件_アイテム名']}</td>
                  <td style={{...tdStyle, fontWeight: 700, color: '#C0392B'}}>{d['項目']}</td>
                  <td style={tdStyle}>{d['項目詳細']}</td>
                  <td style={{...tdStyle, fontFamily: "'JetBrains Mono', monospace", fontSize: 11}}>{d['サンプル段階'].replace(/^[①-⑩]/, '')}</td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : <EmptyNote />}
      </Card>
    </div>
  );
}

function AlertBlock({ title, color, children }) {
  return (
    <div style={{ border: `1px solid ${color}`, borderRadius: 8, overflow: 'hidden' }}>
      <div style={{ background: color, padding: '6px 12px', fontSize: 12, fontWeight: 700, color: '#fff' }}>{title}</div>
      <div style={{ padding: '8px 12px', display: 'flex', flexDirection: 'column', gap: 4 }}>{children}</div>
    </div>
  );
}

function AlertRow({ label, stage, extra }) {
  return (
    <div style={{ display: 'flex', gap: 12, alignItems: 'center', fontSize: 12.5 }}>
      <span style={{ fontWeight: 700, flex: 1 }}>{label}</span>
      {stage && <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: COLORS.inkSoft }}>{stage.replace(/^[①-⑩]/, '')}</span>}
      {extra && <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700 }}>{extra}</span>}
    </div>
  );
}


// ============================================================
// タブ：件数の推移
// ============================================================
function VolumeTab({ data }) {
  const months = useMemo(() => uniq(data.map(d => d['実施月'])).filter(Boolean).sort(monthSort), [data]);
  const stages = useMemo(() => {
    const present = uniq(data.map(d => d['サンプル段階']));
    return STAGE_ORDER.filter(s => present.includes(s));
  }, [data]);

  const monthChart = useMemo(() => {
    return months.map(m => {
      const row = { label: m.replace('年', '/').replace('月', '') };
      stages.forEach(st => {
        row[st] = new Set(data.filter(d => d['実施月'] === m && d['サンプル段階'] === st).map(d => d['案件_アイテム名'])).size;
      });
      return row;
    });
  }, [data, months, stages]);

  const stageChart = useMemo(() => {
    return stages.map(st => ({
      stage: st.replace(/^[①-⑩]/, ''),
      count: new Set(data.filter(d => d['サンプル段階'] === st).map(d => d['案件_アイテム名'])).size,
    }));
  }, [data, stages]);

  // 表形式：月×段階のマトリクス
  const matrix = useMemo(() => {
    return months.map(m => {
      const row = { month: m };
      let total = 0;
      stages.forEach(st => {
        const c = new Set(data.filter(d => d['実施月'] === m && d['サンプル段階'] === st).map(d => d['案件_アイテム名'])).size;
        row[st] = c;
        total += c;
      });
      row['__total'] = total;
      return row;
    });
  }, [data, months, stages]);

  const totalItems = uniq(data.map(d => d['案件_アイテム名'])).length;
  const newCount = uniq(data.filter(d => d['新規リピート'] === '新規').map(d => d['案件_アイテム名'])).length;
  const repeatCount = uniq(data.filter(d => d['新規リピート'] === 'リピート').map(d => d['案件_アイテム名'])).length;

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <StatBlock label="担当アイテム数" value={totalItems} unit="件" accent />
        <StatBlock label="新規" value={newCount} unit="件" />
        <StatBlock label="リピート" value={repeatCount} unit="件" />
        <StatBlock label="対象月数" value={months.length} unit="ヶ月" />
      </div>

      <Card title="時期別の件数" sub="MONTHLY VOLUME BY STAGE">
        {monthChart.length > 0 ? (
          <VBarChart
            data={monthChart.map(row => ({ ...row }))}
            series={stages.map((st, i) => ({ key: st, name: st.replace(/^[①-⑩]/, ''), color: stageColor(i) }))}
            height={300}
            stacked={true}
            formatValue={v => `${v}件`}
          />
        ) : <EmptyNote />}
      </Card>

      <Card title="月別・段階別 件数表" sub="MONTHLY TABLE">
        {matrix.length > 0 ? (
          <div style={{ overflowX: 'auto' }}>
            <table style={tableStyle}>
              <thead>
                <tr>
                  <th style={thStyle}>月</th>
                  {stages.map(st => <th key={st} style={{...thStyle, textAlign:'center'}}>{st.replace(/^[①-⑩]/, '')}</th>)}
                  <th style={{...thStyle, textAlign:'center'}}>合計</th>
                </tr>
              </thead>
              <tbody>
                {matrix.map(row => (
                  <tr key={row.month}>
                    <td style={{...tdStyle, fontWeight: 700}}>{row.month}</td>
                    {stages.map(st => (
                      <td key={st} style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", color: row[st] ? COLORS.ink : COLORS.line}}>
                        {row[st] || '—'}
                      </td>
                    ))}
                    <td style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontWeight: 700}}>{row['__total']}</td>
                  </tr>
                ))}
                <tr style={{ background: COLORS.paperDeep }}>
                  <td style={{...tdStyle, fontWeight: 900}}>合計</td>
                  {stages.map(st => (
                    <td key={st} style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontWeight: 700}}>
                      {matrix.reduce((a, r) => a + r[st], 0)}
                    </td>
                  ))}
                  <td style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontWeight: 900}}>
                    {matrix.reduce((a, r) => a + r['__total'], 0)}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        ) : <EmptyNote />}
      </Card>

      <Card title="サンプル段階別の件数（水位）" sub="VOLUME BY STAGE">
        {stageChart.length > 0 ? (
          <HBarChart
            data={stageChart.map(s => ({ label: s.stage, value: s.count }))}
            height={Math.max(220, stageChart.length * 42)}
            labelWidth={90}
            color={COLORS.gold}
            formatValue={v => `${v}件`}
          />
        ) : <EmptyNote />}
      </Card>

      <BreakdownSection data={data} />
    </div>
  );
}

// ============================================================
// タブ：スコア推移
// ============================================================
function ScoreTab({ data }) {
  const itemTrends = useMemo(() => {
    const m = {};
    data.forEach(d => {
      if (typeof d['スコア'] !== 'number') return;
      const key = d['案件_アイテム名'];
      if (!m[key]) m[key] = {};
      m[key][d['サンプル段階']] = d['スコア'];
    });
    return Object.entries(m).map(([item, stages]) => {
      const entries = Object.entries(stages).sort((a,b) => stageIndex(a[0]) - stageIndex(b[0]));
      const first = entries[0];
      const last = entries[entries.length - 1];
      const diff = entries.length > 1 ? (last[1] - first[1]) : null;
      return { item, entries, diff, latestStage: last[0], latestScore: last[1] };
    });
  }, [data]);

  const multiStage = itemTrends.filter(t => t.entries.length > 1);
  const improved = multiStage.filter(t => t.diff > 0).sort((a,b) => b.diff - a.diff);
  const declined = multiStage.filter(t => t.diff < 0).sort((a,b) => a.diff - b.diff);

  const lateStages = ['⑧量産前', '⑨量産抜き', '⑩完パケ(予備)'];
  const lateLow = itemTrends.filter(t => lateStages.includes(t.latestStage)).sort((a,b) => a.latestScore - b.latestScore);

  const stageAvg = useMemo(() => {
    const m = {};
    data.forEach(d => {
      if (typeof d['スコア'] !== 'number') return;
      const st = d['サンプル段階'];
      if (!m[st]) m[st] = [];
      m[st].push(d['スコア']);
    });
    return STAGE_ORDER.filter(st => m[st]).map(st => ({
      stage: st.replace(/^[①-⑩]/, ''),
      avg: Math.round((m[st].reduce((a,b)=>a+b,0) / m[st].length) * 10) / 10,
      n: m[st].length,
    }));
  }, [data]);

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <StatBlock label="複数段階で比較可能" value={multiStage.length} unit="件" accent />
        <StatBlock label="スコア改善" value={improved.length} unit="件" />
        <StatBlock label="スコア低下" value={declined.length} unit="件" />
        <StatBlock label="納品近接・低スコア注意" value={lateLow.filter(t => t.latestScore < 80).length} unit="件" />
      </div>

      <Card title="サンプル段階別 平均スコア" sub="AVERAGE SCORE BY STAGE — 100点満点">
        {stageAvg.length > 0 ? (
          <LineChartSimple
            data={stageAvg.map(s => ({ label: s.stage, value: s.avg, n: s.n }))}
            height={280}
            color={COLORS.goldDeep}
            refLine={80}
            domain={[0, 100]}
            formatValue={(v, p) => `${v}点 (n=${p.n})`}
          />
        ) : <EmptyNote />}
      </Card>

      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
        <div style={{ flex: '1 1 320px' }}>
          <Card title="スコア改善が大きい順" sub="IMPROVED">
            {improved.length > 0 ? <TrendList items={improved} positive /> : <EmptyNote />}
          </Card>
        </div>
        <div style={{ flex: '1 1 320px' }}>
          <Card title="スコア低下が大きい順" sub="DECLINED">
            {declined.length > 0 ? <TrendList items={declined} positive={false} /> : <EmptyNote />}
          </Card>
        </div>
      </div>

      <Card title="納品近接段階でのスコア（量産前・量産抜き・完パケ）" sub="LATE-STAGE SCORE — 要注意ライン 80点未満">
        {lateLow.length > 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {lateLow.map(t => (
              <div key={t.item} style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px',
                border: `1px solid ${t.latestScore < 80 ? '#C0392B' : COLORS.line}`,
                borderRadius: 8, background: t.latestScore < 80 ? '#FDEEEC' : '#fff',
              }}>
                <span style={{ fontWeight: 700, fontSize: 13, flex: 1 }}>{t.item}</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: COLORS.inkSoft, padding: '2px 8px', border: `1px solid ${COLORS.line}`, borderRadius: 4 }}>{t.latestStage.replace(/^[①-⑩]/, '')}</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 18, fontWeight: 700, color: t.latestScore < 80 ? '#C0392B' : COLORS.ink, minWidth: 60, textAlign: 'right' }}>{t.latestScore}点</span>
              </div>
            ))}
          </div>
        ) : <EmptyNote />}
      </Card>

      <BreakdownSection data={data} />
    </div>
  );
}

function TrendList({ items, positive }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {items.slice(0, 8).map(t => (
        <div key={t.item} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', border: `1px solid ${COLORS.line}`, borderRadius: 8 }}>
          <span style={{ fontSize: 12.5, fontWeight: 600, flex: 1, lineHeight: 1.3 }}>{t.item}</span>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: COLORS.inkSoft }}>{t.entries.map(e => e[1]).join(' → ')}</span>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 14, color: positive ? '#5C7A33' : '#C0392B', minWidth: 46, textAlign: 'right' }}>
            {t.diff > 0 ? '+' : ''}{Math.round(t.diff * 10) / 10}
          </span>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// タブ：不良内容分析
// ============================================================
function DefectsTab({ data }) {
  const issues = data.filter(d => d['区分'] !== '④指摘ナシ' && d['項目']);

  const itemCounts = useMemo(() => {
    const m = {};
    issues.forEach(d => { m[d['項目']] = (m[d['項目']] || 0) + 1; });
    return Object.entries(m).map(([name,count]) => ({ name, count })).sort((a,b)=>b.count-a.count).slice(0,10);
  }, [issues]);

  const levelCounts = useMemo(() => {
    const m = {};
    issues.forEach(d => { m[d['レベル']] = (m[d['レベル']] || 0) + 1; });
    return LEVEL_ORDER.filter(l => m[l]).map(l => ({ level: l, count: m[l] }));
  }, [issues]);

  const itemLevelTable = useMemo(() => {
    const m = {};
    issues.forEach(d => {
      const key = d['項目'];
      if (!m[key]) m[key] = {};
      m[key][d['レベル']] = (m[key][d['レベル']] || 0) + 1;
    });
    return Object.entries(m).map(([item, levels]) => ({ item, levels, total: Object.values(levels).reduce((a,b)=>a+b,0) })).sort((a,b)=>b.total-a.total);
  }, [issues]);

  // リピート/新規 × レベル
  const repeatLevelTable = useMemo(() => {
    const m = {};
    issues.forEach(d => {
      const key = d['新規リピート'] || '—';
      if (!m[key]) m[key] = {};
      m[key][d['レベル']] = (m[key][d['レベル']] || 0) + 1;
    });
    return Object.entries(m).map(([key, levels]) => ({ key, levels, total: Object.values(levels).reduce((a,b)=>a+b,0) }));
  }, [issues]);

  // サンプル段階 × レベル
  const stageLevelTable = useMemo(() => {
    const m = {};
    issues.forEach(d => {
      const key = d['サンプル段階'] || '—';
      if (!m[key]) m[key] = {};
      m[key][d['レベル']] = (m[key][d['レベル']] || 0) + 1;
    });
    return STAGE_ORDER.filter(st => m[st]).map(st => ({ key: st, levels: m[st], total: Object.values(m[st]).reduce((a,b)=>a+b,0) }));
  }, [issues]);

  // 要改善一覧
  const criticalItems = issues.filter(d => d['区分'] === '①要改善');

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <StatBlock label="指摘総数" value={issues.length} unit="件" accent />
        {levelCounts.map(lc => <StatBlock key={lc.level} label={lc.level.replace(/^[①-⑩]/, '')} value={lc.count} unit="件" />)}
      </div>

      <Card title="不良項目 TOP10" sub="DEFECT ITEMS — TOP 10">
        {itemCounts.length > 0 ? (
          <HBarChart
            data={itemCounts.map(d => ({ label: d.name, value: d.count }))}
            height={Math.max(280, itemCounts.length * 32)}
            labelWidth={140}
            color={COLORS.goldDeep}
            formatValue={v => `${v}件`}
          />
        ) : <EmptyNote />}
      </Card>

      <Card title="各項目の懸念レベル" sub="ITEM × RISK LEVEL">
        {itemLevelTable.length > 0 ? (
          <div style={{ overflowX: 'auto' }}>
            <table style={tableStyle}>
              <thead>
                <tr>
                  <th style={thStyle}>項目</th>
                  {LEVEL_ORDER.filter(l=>l!=='⑥指摘ナシ').map(l => <th key={l} style={{...thStyle, textAlign:'center', color: LEVEL_COLOR[l]}}>{l.replace(/^[①-⑩]/, '')}</th>)}
                  <th style={{...thStyle, textAlign:'center'}}>合計</th>
                </tr>
              </thead>
              <tbody>
                {itemLevelTable.map(row => (
                  <tr key={row.item}>
                    <td style={tdStyle}>{row.item}</td>
                    {LEVEL_ORDER.filter(l=>l!=='⑥指摘ナシ').map(l => (
                      <td key={l} style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", color: row.levels[l] ? COLORS.ink : COLORS.line}}>{row.levels[l] || '—'}</td>
                    ))}
                    <td style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontWeight:700}}>{row.total}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : <EmptyNote />}
      </Card>

      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
        <div style={{ flex: '1 1 320px' }}>
          <Card title="新規/リピート別 懸念レベル比較" sub="NEW vs REPEAT">
            {repeatLevelTable.length > 0 ? (
              <LevelCompareTable rows={repeatLevelTable} />
            ) : <EmptyNote />}
          </Card>
        </div>
        <div style={{ flex: '1 1 320px' }}>
          <Card title="サンプル段階別 懸念レベル比較" sub="BY SAMPLE STAGE">
            {stageLevelTable.length > 0 ? (
              <LevelCompareTable rows={stageLevelTable.map(r => ({ ...r, key: r.key.replace(/^[①-⑩]/, '') }))} />
            ) : <EmptyNote />}
          </Card>
        </div>
      </div>

      <Card title="要改善 一覧" sub="MUST-FIX ITEMS — ①要改善">
        {criticalItems.length > 0 ? (
          <table style={tableStyle}>
            <thead><tr><th style={thStyle}>アイテム</th><th style={thStyle}>項目</th><th style={thStyle}>詳細</th><th style={thStyle}>段階</th></tr></thead>
            <tbody>
              {criticalItems.map((d,i) => (
                <tr key={i}>
                  <td style={tdStyle}>{d['案件_アイテム名']}</td>
                  <td style={{...tdStyle, fontWeight:700, color:'#C0392B'}}>{d['項目']}</td>
                  <td style={tdStyle}>{d['項目詳細']}</td>
                  <td style={{...tdStyle, fontFamily:"'JetBrains Mono', monospace", fontSize:11}}>{d['サンプル段階'].replace(/^[①-⑩]/, '')}</td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : <EmptyNote />}
      </Card>

      <BreakdownSection data={data} />
    </div>
  );
}

function LevelCompareTable({ rows }) {
  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={tableStyle}>
        <thead>
          <tr>
            <th style={thStyle}>区分</th>
            {LEVEL_ORDER.filter(l=>l!=='⑥指摘ナシ').map(l => <th key={l} style={{...thStyle, textAlign:'center', color: LEVEL_COLOR[l]}}>{l.replace(/^[①-⑩]/, '')}</th>)}
            <th style={{...thStyle, textAlign:'center'}}>合計</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(row => (
            <tr key={row.key}>
              <td style={{...tdStyle, fontWeight: 700}}>{row.key}</td>
              {LEVEL_ORDER.filter(l=>l!=='⑥指摘ナシ').map(l => (
                <td key={l} style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", color: row.levels[l] ? COLORS.ink : COLORS.line}}>{row.levels[l] || '—'}</td>
              ))}
              <td style={{...tdStyle, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontWeight:700}}>{row.total}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ============================================================
// タブ：仕入先分析
// ============================================================
function SuppliersTab({ data }) {
  const suppliers = useMemo(() => uniq(data.map(d => d['仕入先'])).filter(Boolean).sort(), [data]);

  const supplierStats = useMemo(() => {
    return suppliers.map(s => {
      const rows = data.filter(d => d['仕入先'] === s);
      const issues = rows.filter(d => d['区分'] === '②注意(仕入先)');
      const scores = rows.map(d => d['スコア']).filter(v => typeof v === 'number');
      const avgScore = scores.length ? (scores.reduce((a,b)=>a+b,0) / scores.length) : null;

      const levelM = {};
      issues.forEach(d => { levelM[d['レベル']] = (levelM[d['レベル']] || 0) + 1; });

      const itemM = {};
      issues.forEach(d => { itemM[d['項目']] = (itemM[d['項目']] || 0) + 1; });

      return {
        supplier: s, issueCount: issues.length,
        avgScore: avgScore !== null ? avgScore.toFixed(1) : '—', avgScoreNum: avgScore,
        levels: levelM, items: uniq(rows.map(d => d['案件_アイテム名'])).length,
        defectItems: Object.entries(itemM).sort((a,b)=>b[1]-a[1]),
      };
    }).sort((a,b) => (b.avgScoreNum ?? -1) - (a.avgScoreNum ?? -1));
  }, [data, suppliers]);

  const chartData = supplierStats.filter(s => s.avgScoreNum !== null).map(s => ({ name: `仕入先 ${s.supplier}`, score: s.avgScoreNum }));

  return (
    <div>
      <Card title="仕入先別 平均スコア" sub="AVERAGE SCORE BY SUPPLIER — 100点満点">
        {chartData.length > 0 ? (
          <HBarChart
            data={chartData.map(d => ({ label: d.name, value: d.score, color: scoreColor(d.score) }))}
            height={Math.max(220, chartData.length * 46)}
            labelWidth={90}
            max={100}
            formatValue={v => `${v}点`}
          />
        ) : <EmptyNote />}
      </Card>

      <Card title="仕入先別 詳細・不良項目内訳" sub="SUPPLIER BREAKDOWN & DEFECT ITEMS">
        {supplierStats.length > 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {supplierStats.map(s => (
              <div key={s.supplier} style={{ border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: '14px 16px' }}>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16, alignItems: 'center', marginBottom: s.defectItems.length ? 12 : 0 }}>
                  <div style={{ minWidth: 90 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.inkSoft }}>仕入先</div>
                    <div style={{ fontSize: 18, fontWeight: 900 }}>{s.supplier}</div>
                  </div>
                  <div style={{ minWidth: 90 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.inkSoft }}>平均スコア</div>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 22, fontWeight: 700, color: s.avgScoreNum !== null ? scoreColor(s.avgScoreNum) : COLORS.inkSoft }}>{s.avgScore}</div>
                  </div>
                  <div style={{ minWidth: 80 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.inkSoft }}>担当アイテム</div>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 18, fontWeight: 700 }}>{s.items}件</div>
                  </div>
                  <div style={{ minWidth: 80 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.inkSoft }}>注意件数</div>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 18, fontWeight: 700 }}>{s.issueCount}件</div>
                  </div>
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', flex: 1, minWidth: 200 }}>
                    {Object.entries(s.levels).map(([lv,c]) => (
                      <span key={lv} style={{ fontSize: 11, padding: '4px 9px', borderRadius: 6, border: `1px solid ${LEVEL_COLOR[lv] || COLORS.line}`, color: LEVEL_COLOR[lv] || COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>{lv.replace(/^[①-⑩]/, '')} ×{c}</span>
                    ))}
                  </div>
                </div>
                {s.defectItems.length > 0 && (
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', paddingTop: 10, borderTop: `1px solid ${COLORS.line}` }}>
                    {s.defectItems.map(([item,c]) => (
                      <span key={item} style={{ fontSize: 11.5, padding: '4px 10px', borderRadius: 14, background: COLORS.paperDeep, color: COLORS.ink, fontWeight: 600 }}>
                        {item} <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: COLORS.goldDeep }}>×{c}</span>
                      </span>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        ) : <EmptyNote />}
      </Card>

      <BreakdownSection data={data} />
    </div>
  );
}

// ============================================================
// タブ：弊社側への注意
// ============================================================
function InternalTab({ data }) {
  const trIssues = data.filter(d => d['区分'] === '③注意(TR側)');

  const itemCounts = useMemo(() => {
    const m = {};
    trIssues.forEach(d => { m[d['項目']] = (m[d['項目']] || 0) + 1; });
    return Object.entries(m).map(([name,count]) => ({ name, count })).sort((a,b)=>b.count-a.count);
  }, [trIssues]);

  // 新規/リピート別件数
  const repeatCounts = useMemo(() => {
    const m = {};
    trIssues.forEach(d => { const k = d['新規リピート'] || '—'; m[k] = (m[k] || 0) + 1; });
    return Object.entries(m).map(([name,count]) => ({ name, count }));
  }, [trIssues]);

  // サンプル段階別件数
  const stageCounts = useMemo(() => {
    const m = {};
    trIssues.forEach(d => { const k = d['サンプル段階'] || '—'; m[k] = (m[k] || 0) + 1; });
    return STAGE_ORDER.filter(st => m[st]).map(st => ({ name: st.replace(/^[①-⑩]/, ''), count: m[st] }));
  }, [trIssues]);

  const byCase = useMemo(() => {
    const m = {};
    trIssues.forEach(d => {
      const key = d['案件_アイテム名'];
      if (!m[key]) m[key] = [];
      m[key].push(d);
    });
    return Object.entries(m);
  }, [trIssues]);

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <StatBlock label="TR側への注意件数" value={trIssues.length} unit="件" accent />
        <StatBlock label="対象アイテム数" value={byCase.length} unit="件" />
        <StatBlock label="指摘項目種類" value={itemCounts.length} unit="種" />
      </div>

      <Card title="指摘項目数" sub="ATTENTION ITEMS — TR SIDE">
        {itemCounts.length > 0 ? (
          <HBarChart
            data={itemCounts.map(d => ({ label: d.name, value: d.count }))}
            height={Math.max(200, itemCounts.length * 40)}
            labelWidth={140}
            color="#8FA85E"
            formatValue={v => `${v}件`}
          />
        ) : <EmptyNote />}
      </Card>

      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
        <div style={{ flex: '1 1 280px' }}>
          <Card title="新規/リピート別 件数比較" sub="NEW vs REPEAT">
            {repeatCounts.length > 0 ? (
              <VBarChart
                data={repeatCounts.map(d => ({ label: d.name, v: d.count }))}
                series={[{ key: 'v', name: '件数', color: COLORS.gold }]}
                height={180}
                showLegend={false}
                formatValue={v => `${v}件`}
              />
            ) : <EmptyNote />}
          </Card>
        </div>
        <div style={{ flex: '1 1 280px' }}>
          <Card title="サンプル段階別 指摘数比較" sub="BY SAMPLE STAGE">
            {stageCounts.length > 0 ? (
              <VBarChart
                data={stageCounts.map(d => ({ label: d.name, v: d.count }))}
                series={[{ key: 'v', name: '件数', color: COLORS.goldDeep }]}
                height={180}
                showLegend={false}
                formatValue={v => `${v}件`}
              />
            ) : <EmptyNote />}
          </Card>
        </div>
      </div>

      <Card title="案件別 指摘項目詳細一覧" sub="DETAIL BY CASE">
        {byCase.length > 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {byCase.map(([caseName, rows]) => (
              <div key={caseName} style={{ border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: '12px 14px' }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 8 }}>
                  {caseName}
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: COLORS.inkSoft, marginLeft: 10, fontWeight: 400 }}>
                    {rows[0]['実施日']} / {rows[0]['サンプル段階'].replace(/^[①-⑩]/, '')} / {rows[0]['新規リピート']}
                  </span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {rows.map((r,i) => (
                    <div key={i} style={{ display: 'flex', gap: 10, fontSize: 12.5, alignItems: 'baseline' }}>
                      <span style={{ fontWeight: 700, color: '#5C7A33', minWidth: 90 }}>{r['項目']}</span>
                      <span style={{ color: COLORS.inkSoft }}>{r['項目詳細']}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        ) : <EmptyNote />}
      </Card>
    </div>
  );
}

// ============================================================
// フッター
// ============================================================
function Footer({ count, total }) {
  return (
    <div style={{
      maxWidth: 1100, margin: '0 auto', padding: '16px 24px 32px',
      borderTop: `1px solid ${COLORS.line}`, fontFamily: "'JetBrains Mono', monospace",
      fontSize: 11, color: COLORS.inkSoft, display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8,
    }}>
      <span>SHOWING {count} / {total} RECORDS</span>
      <span>SC ANALYSIS DASHBOARD</span>
    </div>
  );
}

// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
